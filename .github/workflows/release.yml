name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        run: |
          # Linux
          GOOS=linux GOARCH=amd64 go build -o bin/prism-linux-amd64 \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism
          GOOS=linux GOARCH=arm64 go build -o bin/prism-linux-arm64 \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism

          # macOS
          GOOS=darwin GOARCH=amd64 go build -o bin/prism-darwin-amd64 \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism
          GOOS=darwin GOARCH=arm64 go build -o bin/prism-darwin-arm64 \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism

          # Windows
          GOOS=windows GOARCH=amd64 go build -o bin/prism-windows-amd64.exe \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism
          GOOS=windows GOARCH=arm64 go build -o bin/prism-windows-arm64.exe \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism

      - name: Create checksums
        run: |
          cd bin
          sha256sum prism-* > checksums.txt
          cat checksums.txt

      - name: Extract changelog
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -n "/## \[${VERSION#v}\]/,/## \[/p" CHANGELOG.md | sed '$d' > release-notes.md
          # If empty, use a default message
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION" > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            bin/prism-linux-amd64
            bin/prism-linux-arm64
            bin/prism-darwin-amd64
            bin/prism-darwin-arm64
            bin/prism-windows-amd64.exe
            bin/prism-windows-arm64.exe
            bin/checksums.txt
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release info
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} created successfully"
          echo "📦 Binaries uploaded:"
          ls -lh bin/
