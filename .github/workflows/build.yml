name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build Multi-Platform Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: prism-linux-amd64
          - goos: linux
            goarch: arm64
            output: prism-linux-arm64
          - goos: darwin
            goarch: amd64
            output: prism-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: prism-darwin-arm64
          - goos: windows
            goarch: amd64
            output: prism-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: prism-windows-arm64.exe

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o bin/${{ matrix.output }} \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X main.Commit=${{ github.sha }}" \
            ./cmd/prism

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}
          retention-days: 30

  size-check:
    name: Check Binary Size
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v3
        with:
          name: prism-linux-amd64

      - name: Check size
        run: |
          size=$(stat -c%s prism-linux-amd64)
          size_mb=$(echo "scale=2; $size / 1024 / 1024" | bc)
          echo "Binary size: ${size_mb}MB"

          # Warn if over 10MB
          if (( $(echo "$size_mb > 10" | bc -l) )); then
            echo "⚠️  Warning: Binary size ${size_mb}MB exceeds 10MB"
          else
            echo "✅ Binary size ${size_mb}MB is acceptable"
          fi
